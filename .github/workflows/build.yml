name: Build (Windows, Linux & macOS)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxxf86vm-dev \
            vulkan-tools \
            libvulkan-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ninja molten-vk vulkan-headers vulkan-loader

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "build/bin/${{ matrix.build_type }}"
          if (!(Test-Path "$src/QuarkEngine.exe")) {
            $src = "build/bin"
          }
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "$src/QuarkEngine.exe" dist/
          Copy-Item "$src/*.dll"            dist/ -ErrorAction SilentlyContinue
          Copy-Item "build/bin/*.dll"       dist/ -ErrorAction SilentlyContinue
          Copy-Item "build/bin/assets"      dist/assets -Recurse -ErrorAction SilentlyContinue

      - name: Collect artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp build/bin/QuarkEngine dist/
          cp build/bin/*.so         dist/ 2>/dev/null || true
          cp build/bin/*.dylib      dist/ 2>/dev/null || true
          cp -r build/bin/assets    dist/assets 2>/dev/null || true

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: QuarkEngine-windows-${{ matrix.build_type }}
          path: dist/
          if-no-files-found: warn

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: QuarkEngine-linux-${{ matrix.build_type }}
          path: dist/
          if-no-files-found: warn

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: QuarkEngine-macos-${{ matrix.build_type }}
          path: dist/
          if-no-files-found: warn